name: Preview release

on:
  push:
    branches: [main]
  pull_request:
    # `labeled` builds when the `preview` label is added; `synchronize` refreshes
    # the preview on later pushes to an already-labeled PR.
    types: [labeled, synchronize]

# No npm token — pkg.pr.new authenticates via OIDC (id-token) against its
# GitHub App.
permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  preview:
    name: Preview release
    # Auto on push to main; on PRs only when a maintainer adds the `preview`
    # label, and same-repo only (the pkg-pr-new App is installed here) so forks
    # don't publish previews under our name.
    if: >-
      github.repository == 'withplumix/plumix' &&
      (github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'preview')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Globs cover every publishable workspace; private packages are skipped.
      # pkg-pr-new is a root devDependency so Dependabot keeps it current.
      - name: Publish previews to pkg.pr.new
        run: >-
          pnpm exec pkg-pr-new publish --pnpm
          --packageManager=pnpm,npm,yarn
          './packages/*' './packages/plugins/*' './packages/runtimes/*'
