name: Release

on:
  push:
    branches: [main]

concurrency:
  # Serialize releases; never cancel a publish mid-flight.
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release
    # Only the canonical repo has the npm token + Changesets GitHub App.
    if: github.repository == 'withplumix/plumix'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the version bump + git tags
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm provenance via OIDC
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # registry-url writes the .npmrc that authenticates the publish with
      # NODE_AUTH_TOKEN.
      - uses: ./.github/actions/setup
        with:
          registry-url: "https://registry.npmjs.org"

      # When changesets exist, this opens/updates the "Version Packages" PR
      # (running `pnpm version-packages`). When that PR is merged and no
      # changesets remain, it runs the publish command `pnpm release` —
      # build → publint → attw → smoke → changeset publish, in that order and
      # in one step — so a publish can only happen if the gate passes. The `&&`
      # chain means a failed gate never reaches `changeset publish`. Publishing
      # also requires NPM_TOKEN, so nothing releases before both a merged
      # Version PR and the token exist.
      - name: Version PR or gated publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
