name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # never cancel an in-flight publish; PR gate runs are cancellable
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || 'release' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  # Required check on every PR that only does real work on the Version PR
  # (changeset-release/*), where a green gate blocks a broken publish.
  gate:
    name: Release gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Is this the Version PR?
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == changeset-release/* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false (no-op)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.run == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - if: steps.check.outputs.run == 'true'
        uses: ./.github/actions/setup
      - if: steps.check.outputs.run == 'true'
        run: pnpm build
      # the one thing per-PR publint/attw can't cover: publish real tarballs to
      # Verdaccio, scaffold from the registry, boot, expect 200
      - if: steps.check.outputs.run == 'true'
        run: SMOKE_SKIP_BUILD=1 pnpm smoke

  release:
    name: Release
    # canonical repo only: it's the OIDC trusted publisher and has the App
    if: github.event_name == 'push' && github.repository == 'withplumix/plumix'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write # OIDC publish; the App token below supplies contents/PR writes
    steps:
      # Push the Version PR under the App, not GITHUB_TOKEN: GitHub won't trigger
      # workflows from GITHUB_TOKEN events, so its required checks would never run.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true # changesets/action pushes commits/tags/PR with it
          token: ${{ steps.app-token.outputs.token }}

      # no npm auth on purpose: a token .npmrc resolves to an empty token and
      # shadows OIDC trusted publishing
      - uses: ./.github/actions/setup

      # Ordinary merges have nothing to publish; skip the step below so they
      # don't run a full cold build for a no-op `changeset publish`.
      - name: Detect release work
        id: detect
        run: |
          run=false
          if [ -n "$(find .changeset -maxdepth 1 -name '*.md' ! -iname 'README.md' -print -quit)" ]; then
            run=true # changeset pending → Version PR
          else
            # a pipeline, not `< <(…)`, so a pnpm/jq failure fails the step
            # instead of silently reading nothing and skipping a release
            pkgs=$(pnpm -r ls --depth -1 --json | jq -r '.[] | select(.private != true) | [.name, .version] | @tsv')
            while IFS=$'\t' read -r name version; do
              # changeset publish tags each released name@version; untagged = unpublished
              git rev-parse -q --verify "refs/tags/$name@$version" >/dev/null || run=true
            done <<< "$pkgs"
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"

      # changesets present → open/update the Version PR; none → `pnpm release`
      # publishes via OIDC (npm exchanges the workflow identity, no token).
      - name: Version PR or publish
        if: steps.detect.outputs.run == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # empty (not unset) so changesets/action skips npm-token auth and falls
          # through to OIDC — https://github.com/changesets/changesets/issues/1152
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
