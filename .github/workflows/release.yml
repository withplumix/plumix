name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Serialize the publish (never cancel a release mid-flight); PR gate runs are
  # per-PR and cancellable.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || 'release' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  # The publish gate. Runs on every PR so it can be a REQUIRED check (add it to
  # the branch ruleset), but only does the heavy work on the auto-generated
  # "Version Packages" PR (branch changeset-release/*) — merging that PR is what
  # triggers the publish, so a required-and-green gate blocks a broken release.
  # A ~15s no-op on normal PRs (all real steps skip, the job still succeeds).
  gate:
    name: Release gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Is this the Version PR?
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == changeset-release/* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false (no-op)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.run == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - if: steps.check.outputs.run == 'true'
        uses: ./.github/actions/setup
      - if: steps.check.outputs.run == 'true'
        run: pnpm build
      # Verdaccio → publish all 14 → scaffold from the registry → boot → 200.
      # publint/attw run per-PR in ci.yml; this gate is the one thing that needs
      # the actual published tarballs.
      - if: steps.check.outputs.run == 'true'
        run: SMOKE_SKIP_BUILD=1 pnpm smoke

  release:
    name: Release
    # Only the canonical repo is the configured OIDC trusted publisher on npm
    # and has the Changesets GitHub App.
    if: github.event_name == 'push' && github.repository == 'withplumix/plumix'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write # OIDC trusted publishing + provenance (no npm token)
    steps:
      # Push the version bump + "Version Packages" PR under a GitHub App
      # identity, NOT GITHUB_TOKEN. GitHub refuses to trigger workflows from
      # GITHUB_TOKEN-authored events (anti-recursion), so a token-pushed Version
      # PR never gets ci.yml or the Release gate — its required checks sit
      # unreported and it can't merge. App-token pushes DO trigger workflows.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Intentionally persisted: changesets/action pushes the version bump,
          # git tags, and the "Version Packages" PR using this credential.
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      # setup configures no npm auth on purpose: a token-based .npmrc would
      # resolve to an empty _authToken and shadow OIDC. npm publishes to the
      # default registry and authenticates via the id-token exchange below.
      - uses: ./.github/actions/setup

      # When changesets exist, this opens/updates the "Version Packages" PR
      # (running `pnpm version-packages`). Merging that PR — gated green above —
      # lands with no changesets, so this runs `pnpm release` to publish to npm.
      # Publishing is tokenless: npm (>= 11.5.1, bundled with the pinned Node)
      # exchanges the workflow's OIDC identity for a short-lived credential, so
      # nothing releases without a merged, gated Version PR from this repo.
      - name: Version PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # Empty (not absent) so changesets/action skips token-based auth setup
          # and npm falls through to OIDC trusted publishing.
          # https://github.com/changesets/changesets/issues/1152
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
