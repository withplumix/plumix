name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Serialize the publish (never cancel a release mid-flight); PR gate runs are
  # per-PR and cancellable.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || 'release' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  # The publish gate. Runs on every PR so it can be a REQUIRED check (add it to
  # the branch ruleset), but only does the heavy work on the auto-generated
  # "Version Packages" PR (branch changeset-release/*) — merging that PR is what
  # triggers the publish, so a required-and-green gate blocks a broken release.
  # A ~15s no-op on normal PRs (all real steps skip, the job still succeeds).
  gate:
    name: Release gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Is this the Version PR?
        id: check
        run: |
          if [[ "${{ github.head_ref }}" == changeset-release/* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false (no-op)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v7
      - if: steps.check.outputs.run == 'true'
        uses: ./.github/actions/setup
      - if: steps.check.outputs.run == 'true'
        run: pnpm build
      # Verdaccio → publish all 14 → scaffold from the registry → boot → 200.
      # publint/attw run per-PR in ci.yml; this gate is the one thing that needs
      # the actual published tarballs.
      - if: steps.check.outputs.run == 'true'
        run: SMOKE_SKIP_BUILD=1 pnpm smoke

  release:
    name: Release
    # Only the canonical repo is the configured OIDC trusted publisher on npm
    # and has the Changesets GitHub App.
    if: github.event_name == 'push' && github.repository == 'withplumix/plumix'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # push the version bump + git tags
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # OIDC trusted publishing + provenance (no npm token)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # No registry-url: that would write an .npmrc with an empty _authToken
      # (the token is gone) which shadows OIDC. npm publishes to the default
      # registry and authenticates via the id-token exchange instead.
      - uses: ./.github/actions/setup

      # When changesets exist, this opens/updates the "Version Packages" PR
      # (running `pnpm version-packages`). Merging that PR — gated green above —
      # lands with no changesets, so this runs `pnpm release` to publish to npm.
      # Publishing is tokenless: npm (>= 11.5.1, bundled with the pinned Node)
      # exchanges the workflow's OIDC identity for a short-lived credential, so
      # nothing releases without a merged, gated Version PR from this repo.
      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "ci: version packages"
          title: "ci: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty (not absent) so changesets/action skips token-based auth setup
          # and npm falls through to OIDC trusted publishing.
          # https://github.com/changesets/changesets/issues/1152
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
