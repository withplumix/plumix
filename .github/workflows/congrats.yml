name: Congrats

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  congrats:
    if: github.event.pull_request.merged == true
    name: First-time contributor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const repo = context.repo;

            const { data: prs } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${repo.owner}/${repo.repo} type:pr author:${author} is:merged`,
            });

            if (prs.total_count === 1) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Congrats on your first Plumix PR, @${author}! Thanks for contributing!`,
              });
            }
