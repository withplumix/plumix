name: Congrats

on:
  # pull_request_target (not pull_request) so the job can comment on PRs from
  # forks — a fork's pull_request token is read-only. Safe here: the job never
  # checks out or runs PR-authored code, it only calls the GitHub API with the
  # PR author's login, so there's no untrusted-code execution path.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [closed]

permissions:
  pull-requests: write

jobs:
  congrats:
    if: github.event.pull_request.merged == true
    name: First-time contributor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const repo = context.repo;

            const { data: prs } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${repo.owner}/${repo.repo} type:pr author:${author} is:merged`,
            });

            if (prs.total_count === 1) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Congrats on your first Plumix PR, @${author}! Thanks for contributing!`,
              });
            }
