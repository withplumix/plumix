name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  FORCE_COLOR: 3
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  commitlint:
    name: Commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  changesets:
    name: Changesets
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # We're deliberately in 0.x. A `major` changeset resolves straight to
      # 1.0.0 (changesets does no 0.x demotion), so block it from shipping as a
      # side effect of merging a feature PR — crossing 1.0 is a decision.
      - name: Block >= 1.0.0 while in 0.x
        run: pnpm check-no-major

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm format

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  knip:
    name: Knip
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # Catalogs are gitignored build output; generate them so core's
      # static catalog imports resolve before knip walks the graph.
      - run: pnpm exec turbo run i18n:compile
      - run: pnpm knip

  i18n:
    name: i18n
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm i18n:check

  i18n-ratchet:
    name: i18n ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm i18n:ratchet:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm test

  test-e2e:
    name: Test (e2e)
    runs-on: ubuntu-latest
    # The heaviest job (Playwright across admin + plugins) runs close to 10 min;
    # give it headroom so a slow/loaded runner doesn't cancel it mid-suite.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      # Cache the Playwright browser binaries (~120 MB) keyed on the resolved
      # @playwright/test version (declared via the pnpm catalog, so read the
      # installed version rather than the spec). System deps (apt libs like
      # libnss3) aren't cached cross-runner — they're reinstalled cheaply via
      # install-deps.
      - name: Resolve Playwright version
        id: playwright-version
        shell: bash
        run: |
          version=$(pnpm --filter @plumix/admin exec playwright --version | awk '{print $NF}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: packages/admin
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit — browsers already there)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: packages/admin
        run: pnpm exec playwright install-deps chromium

      - run: pnpm test:e2e

      - name: Upload Playwright reports + traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-reports
          # `playwright-report/` is the HTML report; `test-results/`
          # carries the per-test artifacts that matter for diagnosing
          # CI-only flakes — `trace.zip`, `error-context.md`,
          # screenshots, videos. Globbing both keeps the upload self-
          # contained per package without enumerating each workspace.
          path: |
            **/playwright-report/
            **/test-results/
          if-no-files-found: warn
          retention-days: 5

  deploy-check:
    name: Deploy check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      # Validate the generated dist/*/wrangler.json against the repo-pinned
      # wrangler (a dry run needs no account or secrets). The production deploy
      # runs an unpinned `pnpm dlx wrangler`, so a new wrangler release can
      # reject the generated config and break prod with no code change; pinning
      # this check to the workspace wrangler surfaces that on the PR that bumps
      # wrangler instead.
      - run: pnpm exec turbo run build --filter "./examples/*"
      - name: Dry-run deploy (blog)
        run: pnpm --filter @plumix-examples/blog exec wrangler deploy --dry-run
      - name: Dry-run deploy (minimal)
        run: pnpm --filter @plumix-examples/minimal exec wrangler deploy --dry-run

  publint:
    name: Publint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm publint

  attw:
    name: Are The Types Wrong
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm attw

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: typos
      # Markdown/prose only. Code + i18n catalogs carry their own vocabulary
      # (acronyms, identifiers, localized strings, deliberate test fixtures)
      # that would need a large allowlist for zero real bugs.
      - name: Spellcheck markdown
        run: git ls-files '*.md' '*.mdx' | xargs -r typos

  links:
    name: Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Offline: verify relative/local links resolve. External URLs are checked
      # weekly by link-check.yml so a flaky remote never blocks a PR.
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: "--offline --no-progress '**/*.md'"
          fail: true
