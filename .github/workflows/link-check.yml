name: Link Check

# External links are flaky (rate limits, transient failures), so they're checked
# on a schedule rather than per-PR — where they'd red-X unrelated changes. The
# per-PR CI job checks internal/relative links offline. A failure here notifies
# maintainers via GitHub's scheduled-workflow failure email.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  links:
    name: External links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: "--no-progress '**/*.md'"
          fail: true
