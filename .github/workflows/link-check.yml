name: Link Check

# External links are flaky (rate limits, transient failures), so they're checked
# on a schedule rather than per-PR — where they'd red-X unrelated changes. The
# per-PR CI job checks internal/relative links offline. A failure here notifies
# maintainers via GitHub's scheduled-workflow failure email.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  links:
    name: External links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress '**/*.md'"
          fail: true
