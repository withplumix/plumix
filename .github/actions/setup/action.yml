name: "Setup and install"
description: "Common setup steps for CI"

inputs:
  registry-url:
    description: "npm registry to configure for publish auth (writes .npmrc for NODE_AUTH_TOKEN). Omit on non-publishing jobs."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5

    - uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        cache: "pnpm"
        registry-url: ${{ inputs.registry-url }}

    - shell: bash
      run: pnpm install --frozen-lockfile
