name: "Setup and install"
description: "Common setup steps for CI"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5

    - uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"
        cache: "pnpm"

    - shell: bash
      run: pnpm install --frozen-lockfile
