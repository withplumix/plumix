version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
      typescript-eslint:
        patterns:
          - "typescript-eslint"
          - "@typescript-eslint/*"
      turbo:
        patterns:
          - "turbo"
          - "eslint-plugin-turbo"
      commitlint:
        patterns:
          - "@commitlint/*"
      arethetypeswrong:
        patterns:
          - "@arethetypeswrong/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      tiptap:
        patterns:
          - "@tiptap/*"
      orpc:
        patterns:
          - "@orpc/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      fontsource:
        patterns:
          - "@fontsource*/*"
    ignore:
      # @types/node major version must match .nvmrc — bump manually with Node upgrades
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
