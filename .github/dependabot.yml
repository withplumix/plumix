version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # Let a release age before proposing it, so a compromised or broken
    # brand-new version isn't adopted the moment it publishes.
    cooldown:
      default-days: 7
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
        exclude-patterns:
          - "eslint-plugin-turbo"
      typescript-eslint:
        patterns:
          - "typescript-eslint"
          - "@typescript-eslint/*"
      turbo:
        patterns:
          - "turbo"
          - "eslint-plugin-turbo"
      commitlint:
        patterns:
          - "@commitlint/*"
      arethetypeswrong:
        patterns:
          - "@arethetypeswrong/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      tiptap:
        patterns:
          - "@tiptap/*"
      orpc:
        patterns:
          - "@orpc/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "drizzle-valibot"
      oslojs:
        patterns:
          - "@oslojs/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      forms:
        patterns:
          - "react-hook-form"
          - "@hookform/*"
      prettier:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
          - "@ianvs/prettier-plugin-*"
      fontsource:
        patterns:
          - "@fontsource*/*"
      lingui:
        patterns:
          - "@lingui/*"
    ignore:
      # @types/node major version must match .nvmrc — bump manually with Node upgrades
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
