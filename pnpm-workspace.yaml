packages:
  - "packages/admin"
  - "packages/admin-editor"
  - "packages/admin-ui"
  - "packages/blocks"
  - "packages/core"
  - "packages/create-plumix-app"
  - "packages/plumix"
  - "packages/runtimes/*"
  - "packages/plugins/*"
  - "packages/plugins/*/playground"
  - "examples/*"
  - "tooling/*"

# Default catalog: version-coordinated deps that aren't part of a multi-package
# family. Multi-package families live in the named catalogs below. Single-consumer
# deps (incl. the @oslojs/* auth stack, @hookform/resolvers, the prettier plugins)
# are not cataloged at all — they stay inline in their own package.json.
catalog:
  "@arethetypeswrong/cli": ^0.18.4
  "@libsql/client": ^0.17.4
  "@playwright/test": ^1.61.0
  "@types/node": ^24.13.2
  cmdk: ^1.1.1
  esbuild: ^0.28.1
  eslint: ^10.6.0
  fishery: ^2.4.0
  jsdom: ^29.1.1
  lucide-react: ^1.23.0
  prettier: ^3.9.3
  publint: ^0.3.21
  radix-ui: ^1.5.0
  react-hook-form: ^7.80.0
  sonner: ^2.0.7
  tailwind-merge: ^3.6.0
  typescript: ^6.0.3
  valibot: ^1.4.1

# Named catalogs group a multi-package family (2+ packages, 2+ consumers) under one
# handle, named to match its group in .github/dependabot.yml. Referenced as
# `catalog:<name>` from consumer package.json files.
catalogs:
  react:
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    react: ^19.2.7
    react-dom: ^19.2.7
  lingui:
    "@lingui/babel-plugin-lingui-macro": ^6.4.0
    "@lingui/cli": ^6.4.0
    "@lingui/core": ^6.4.0
    "@lingui/format-po": ^6.4.0
    "@lingui/react": ^6.4.0
    "@lingui/vite-plugin": ^6.4.0
  tailwind:
    "@tailwindcss/node": ^4.3.2
    "@tailwindcss/oxide": ^4.3.2
    "@tailwindcss/postcss": ^4.3.2
    "@tailwindcss/typography": ^0.5.16
    "@tailwindcss/vite": ^4.3.2
    tailwindcss: ^4.3.2
  vitest:
    "@vitest/coverage-v8": ^4.1.10
    vitest: ^4.1.10
  vite:
    "@vitejs/plugin-react": ^6.0.3
    vite: ^8.1.3
  tiptap:
    "@tiptap/core": ^3.27.2
    "@tiptap/react": ^3.27.2
    # Explicit extension set for the rich-text rail instead of starter-kit,
    # which bundles ~16 extensions but we activate only these (the rest are
    # disabled marks we replace with @plumix/blocks marks, or nodes that are
    # standalone blocks). All pinned in lockstep with @tiptap/core so a single
    # prosemirror/core copy is bundled.
    "@tiptap/extension-blockquote": ^3.27.2
    "@tiptap/extension-document": ^3.27.2
    "@tiptap/extension-hard-break": ^3.27.2
    "@tiptap/extension-heading": ^3.27.2
    "@tiptap/extension-list": ^3.27.2
    "@tiptap/extension-paragraph": ^3.27.2
    "@tiptap/extension-text": ^3.27.2
    "@tiptap/extensions": ^3.27.2
  orpc:
    "@orpc/client": ^1.14.7
    "@orpc/openapi": ^1.14.7
    "@orpc/server": ^1.14.7
    "@orpc/tanstack-query": ^1.14.7
    "@orpc/valibot": ^1.14.7
  tanstack:
    "@tanstack/react-query": ^5.101.2
    "@tanstack/react-query-devtools": ^5.101.2
    "@tanstack/react-router": ^1.170.17
    "@tanstack/react-router-devtools": ^1.167.0
    "@tanstack/react-table": ^8.21.3
    "@tanstack/router-plugin": ^1.168.19
  drizzle:
    drizzle-kit: ^0.31.10
    drizzle-orm: ^0.45.2
    drizzle-valibot: ^0.4.2
  oslojs:
    "@oslojs/crypto": ^1.0.1
    "@oslojs/encoding": ^1.1.0
    "@oslojs/webauthn": ^1.0.0
  testing-library:
    "@testing-library/jest-dom": ^6.9.1
    "@testing-library/react": ^16.3.2
    "@testing-library/user-event": ^14.6.1
  dnd-kit:
    "@dnd-kit/core": ^6.3.1
    "@dnd-kit/modifiers": ^9.0.0
    "@dnd-kit/sortable": ^10.0.0
    "@dnd-kit/utilities": ^3.2.2
  cloudflare:
    "@cloudflare/vite-plugin": ^1.42.3
    "@cloudflare/workers-types": ^4.20260629.1
    wrangler: ^4.105.0

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
